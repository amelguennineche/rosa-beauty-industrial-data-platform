version: 2

models:

  - name: fact_production

    description: "Table de faits contenant les événements de production."

    columns:

      - name: production_id
        description: "Identifiant unique de la production."
        tests:
          - unique
          - not_null

      - name: product_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_products')
                field: product_id

      - name: factory_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_factories')
                field: factory_id

      - name: date_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_id