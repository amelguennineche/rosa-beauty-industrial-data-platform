version: 2

models:

  - name: stg_products
    description: "Produits fabriqués par Rosa Manufacturing"

    columns:

      - name: product_id
        description: "Identifiant unique du produit"
        tests:
          - unique
          - not_null


  - name: stg_factories
    description: "Usines de production"

    columns:

      - name: factory_id
        description: "Identifiant unique de l'usine"
        tests:
          - unique
          - not_null


  - name: stg_production_orders
    description: "Ordres de production"

    columns:

      - name: production_id
        description: "Identifiant unique de l'ordre de production"
        tests:
          - unique
          - not_null

      - name: product_id
        tests:
          - not_null

      - name: factory_id
        tests:
          - not_null